<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages | Shreya Bakes Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="images/sb_logo.png">
</head>
<body class="admin-body">
<div class="top-bar">
    <div class="top-bar-container">
        <span>Admin Panel</span>
        <span><a href="home.html">Customer Website</a></span>
    </div>
</div>

<nav>
    <div class="nav-container">
        <div class="logo">
            <img src="images/sb_logo.png" alt="Shreya Bakes logo">
            <span>Shreya Bakes Admin</span>
        </div>
        <ul>
            <li><a href="admin.html">Dashboard</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="customers.html">Customers</a></li>
            <li><a href="admin-reviews.html">Reviews</a></li>
            <li><a href="messages.html">Messages</a></li>
        </ul>
    </div>
</nav>

<section class="section hidden" id="adminDashboard">
    <div class="container">
        <div class="admin-header">
            <div>
                <span class="eyebrow">Messages</span>
                <h1>Contact Us Details</h1>
                <p>View contact form submissions and mark them as New, Read, or Resolved.</p>
            </div>
            <div class="inline-actions">
                <button class="btn-primary" onclick="loadMessages()">Refresh</button>
            </div>
        </div>

        <div class="admin-filter-bar">
            <button class="category-btn active" data-filter="All" onclick="setMessageFilter('All')">All</button>
            <button class="category-btn" data-filter="New" onclick="setMessageFilter('New')">New</button>
            <button class="category-btn" data-filter="Read" onclick="setMessageFilter('Read')">Read</button>
            <button class="category-btn" data-filter="Resolved" onclick="setMessageFilter('Resolved')">Resolved</button>
        </div>

        <div class="admin-panel">
            <div id="messagesList" class="admin-card-grid"></div>
        </div>
    </div>
</section>

<div id="toast" class="toast"></div>
<script src="js/auth.js"></script>
<script src="js/messages.js"></script>
</body>
</html>
